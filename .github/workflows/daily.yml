name: Daily LeetCode Update

on:
  schedule:
    - cron: '10,20 18 * * *'   # 11:40 PM & 11:50 PM IST
  workflow_dispatch:

jobs:
  update:
    runs-on: windows-latest   # IMPORTANT for certutil

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread oauth2client requests

      - name: Create credentials.json from secret
        run: |
          echo ${{ secrets.GOOGLE_CREDENTIALS }} > creds.txt
          certutil -decode creds.txt credentials.json

      - name: Run Daily Script
        run: python daily_update.py
