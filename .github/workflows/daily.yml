name: Daily LeetCode Tracker

on:
  workflow_dispatch:

  schedule:
    - cron: "10,20 18 * * *"   # 11:40 PM & 11:50 PM IST

jobs:
  update:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests gspread oauth2client

      - name: Restore credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDS }}" | base64 --decode > credentials.json

      - name: Run daily script
        run: python daily_update.py
